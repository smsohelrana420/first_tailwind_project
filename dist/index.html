<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./style.css" rel="stylesheet" />
  </head>
  <body class="bg-[#2B2D33]">
    <nav class="bg-[#2B2D33] shadow-xl">
      <div class="container mx-auto">
        <div class="sm:flex justify-between items-center py-5">
          <div class="text-center mb-3">
            <a href="#" class="text-white text-xl sm:text-3xl font-bold"
              ><span class="text-[#F65023]">S</span>mart Cod<span
                class="text-[#F65023]"
                >ers</span
              ></a
            >
          </div>
          <ul
            class="sm:flex text-white text-xl text-center border-t sm:border-none"
          >
            <li class="mt-4 sm:mt-0">
              <a href="#" class="p-3 text-[#F65023]">Home</a>
            </li>
            <li><a href="#" class="p-3 hover:text-[#F65023]">Products</a></li>
            <li><a href="#" class="p-3 hover:text-[#F65023]">Blogs</a></li>
            <li><a href="#" class="p-3 hover:text-[#F65023]">Portfolio</a></li>
            <li><a href="#" class="p-3 hover:text-[#F65023]">Contact</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <header class="container mx-auto">
      <div
        class="sm:flex items-center border border-indigo-600 border-t-0 justify-around text-center text-white h-[85vh] px-10 pt-10"
      >
        <div>
          <h1
            class="text-2xl sm:text-5xl font-medium mb-5 sm:mb-12 leading-[1.5]"
          >
            Smart Coders: Learn <br />
            Programming
          </h1>
          <button
            class="bg-indigo-900 px-10 py-3 transition duration-700 ease-in-out rounded-full text-xl shadow-xl hover:bg-indigo-950 cursor-pointer"
          >
            Join: Programming Shikbo's Teams
            <svg
              class="w-7 inline-block text-red-500 animate-ping transition delay-700 duration-300 ease-in-out"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              strokeWidth="{1.5}"
              stroke="currentColor"
              className="size-6"
            >
              <path
                strokeLinecap="round"
                strokeLinejoin="round"
                d="M17.25 8.25 21 12m0 0-3.75 3.75M21 12H3"
              />
            </svg>
          </button>
        </div>
        <div>
          <img class="animate-pulse" src="/images/hero-img.png" alt="" />
        </div>
      </div>
    </header>
  </body>
</html>
